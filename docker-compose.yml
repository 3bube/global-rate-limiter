services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ratelimiter
      POSTGRES_PASSWORD: ratelimiter
      POSTGRES_DB: ratelimiter
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ratelimiter"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      PORT: 3000
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://ratelimiter:ratelimiter@postgres:5432/ratelimiter
      API_KEY: ${API_KEY:-dev-api-key}
    ports:
      - "3000:3000"
    volumes:
      # Bind-mount the client limits so they can be edited at runtime and
      # applied via POST /v1/admin/clients/reload -- no image rebuild.
      - ./src/clients/clients.json:/app/dist/clients/clients.json:ro
    command: sh -c "node dist/db/migrate.js && node dist/server.js"

  analytics-worker:
    build: .
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      app:
        condition: service_started
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://ratelimiter:ratelimiter@postgres:5432/ratelimiter
    command: node dist/logging/analyticsWorker.js

volumes:
  pgdata:
