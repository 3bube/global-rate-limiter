<svg viewBox="0 0 920 640" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Global Rate Limiter Architecture</title>
<desc>Clients hit a load balancer distributing to multiple app instances, which all check a shared Redis for token bucket state and write usage events to a Redis stream. A separate analytics worker batches those events into Postgres, which a dashboard reads from.</desc>
<defs>
<marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
<path d="M0,0 L6,3 L0,6 Z" fill="#666666"/>
</marker>
</defs>
<style>
.box { fill: #ffffff; stroke: #cccccc; stroke-width: 1.5; }
.accent { fill: #eef4ff; stroke: #4a86e8; stroke-width: 1.5; }
.accent2 { fill: #fef1d1; stroke: #cf8933; stroke-width: 1.5; }
.title { font-family: Arial, sans-serif; font-size: 14px; font-weight: 600; fill: #1a1a1a; }
.sub { font-family: Arial, sans-serif; font-size: 11px; fill: #555555; }
.label { font-family: Arial, sans-serif; font-size: 10.5px; fill: #666666; }
.edge { stroke: #999999; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
</style>
<rect width="920" height="640" fill="#ffffff"/>

<rect x="380" y="16" width="160" height="46" rx="8" class="box"/>
<text x="460" y="38" text-anchor="middle" class="title">Client / caller</text>
<text x="460" y="53" text-anchor="middle" class="sub">calls a 3rd-party API</text>

<rect x="380" y="96" width="160" height="46" rx="8" class="box"/>
<text x="460" y="118" text-anchor="middle" class="title">Load Balancer</text>
<text x="460" y="133" text-anchor="middle" class="sub">any instance, any request</text>

<rect x="120" y="186" width="150" height="52" rx="8" class="accent"/>
<text x="195" y="208" text-anchor="middle" class="title">App instance 1</text>
<text x="195" y="223" text-anchor="middle" class="sub">rate limiter API</text>

<rect x="385" y="186" width="150" height="52" rx="8" class="accent"/>
<text x="460" y="208" text-anchor="middle" class="title">App instance 2</text>
<text x="460" y="223" text-anchor="middle" class="sub">rate limiter API</text>

<rect x="650" y="186" width="150" height="52" rx="8" class="accent"/>
<text x="725" y="208" text-anchor="middle" class="title">App instance N</text>
<text x="725" y="223" text-anchor="middle" class="sub">rate limiter API</text>

<rect x="310" y="296" width="300" height="66" rx="8" class="accent2"/>
<text x="460" y="320" text-anchor="middle" class="title">Redis</text>
<text x="460" y="336" text-anchor="middle" class="sub">token bucket state (Lua, atomic)</text>
<text x="460" y="350" text-anchor="middle" class="sub">usage-events stream</text>

<rect x="310" y="406" width="300" height="46" rx="8" class="box"/>
<text x="460" y="428" text-anchor="middle" class="title">Analytics worker</text>
<text x="460" y="443" text-anchor="middle" class="sub">batches stream → Postgres</text>

<rect x="310" y="486" width="300" height="46" rx="8" class="box"/>
<text x="460" y="508" text-anchor="middle" class="title">Postgres</text>
<text x="460" y="523" text-anchor="middle" class="sub">request_log (analytics/billing)</text>

<rect x="380" y="566" width="160" height="46" rx="8" class="box"/>
<text x="460" y="588" text-anchor="middle" class="title">Dashboard</text>
<text x="460" y="603" text-anchor="middle" class="sub">usage, trends, filters</text>

<path d="M460,62 L460,96" class="edge"/>
<path d="M420,142 L220,186" class="edge"/>
<path d="M460,142 L460,186" class="edge"/>
<path d="M500,142 L700,186" class="edge"/>

<path d="M220,238 L370,296" class="edge"/>
<path d="M460,238 L460,296" class="edge"/>
<path d="M700,238 L560,296" class="edge"/>

<path d="M460,362 L460,406" class="edge"/>
<path d="M460,452 L460,486" class="edge"/>
<path d="M460,532 L460,566" class="edge"/>

<text x="620" y="365" class="label">check-and-consume (a few ms)</text>
<text x="640" y="392" class="label">XADD (fire-and-forget)</text>
<text x="640" y="470" class="label">batched INSERT</text>
</svg>
