<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Rate Limiter Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.3/chart.umd.min.js"></script>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <h1>Client Usage Dashboard</h1>
  <div class="controls">
    <label>API key: <input id="apiKey" type="password" placeholder="x-api-key" /></label>
    <label>Client: <select id="clientSelect"></select></label>
    <label>Window:
      <select id="daysSelect">
        <option value="10">Last 10 days</option>
        <option value="15">Last 15 days</option>
        <option value="30" selected>Last 30 days</option>
      </select>
    </label>
    <label>Granularity:
      <select id="granularitySelect">
        <option value="day" selected>Per day</option>
        <option value="hour">Per hour</option>
      </select>
    </label>
    <label>Outcome:
      <select id="outcomeSelect">
        <option value="all" selected>All</option>
        <option value="allowed">Allowed only</option>
        <option value="denied">Denied only</option>
      </select>
    </label>
    <button id="refresh">Refresh</button>
  </div>

  <div id="error"></div>

  <div class="stats">
    <div class="stat"><div class="label">Total requests</div><div class="value" id="statTotal">-</div></div>
    <div class="stat"><div class="label">Denied</div><div class="value" id="statDenied">-</div></div>
    <div class="stat"><div class="label">Avg check latency (limiter overhead)</div><div class="value" id="statLatency">-</div></div>
  </div>

  <canvas id="trendChart"></canvas>

  <script src="main.js"></script>
</body>
</html>
